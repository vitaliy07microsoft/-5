<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>вёрстка 2</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <aside>
      <img src="./bg.jpg" class="aside-image" />
    </aside>

    <main>
      <form>
        <section class="main-info">
            <h2 class="title-1">
              Get iintoo it today
            </h2>
            <div class="subtitle-1">
                There is no charge or obligation upon registration
            </div>
        </section>

        <section class="social-buttons">
            <button class="facebook-button"><img src="./facebook.svg" id="facebook-logo"> Register with Facebook</button>
            <button class="linkedin-button"><img src="./linkedin.svg" id="linkedin-logo"> Register with Linkedin</button>
        </section>

        <section class="or-line">
            <div class="line"></div>
            <span class="on-hr">OR</span>
            <div class="line"></div>
        </section>

        <!-- <section class="personal-info-input">
            <input type="email" placeholder="Email" class="email-input" required>
            <input type="tel" placeholder="Phone" class="phone-input" required>
        </section> -->

        <selection class="email-phone-input">
          <div class="email-input-border">
            <div class="email-text">Email</div>
            <input type="email" class="email-input-zone">
          </div>
          
          <div class="phone-input-border">
            <div class="phone-text">Phone</div>
            <input type="tel" class="phone-input-zone">
          </div>

        </selection>

        <section class="investor-type">
            <h2 class="title-2">What type of investor are you?</h2>
            <div class="subtitle-2">select the type of investor you are below.</div>
        </section>

        <section class="investor-type">
          <div class="investor-type-select-text">
            <input type="radio" id="individual" class="inverstor-type-select-radio" name="investor" value="individual" required>
            <label for="individual">Individual</label>
            <span class="individual-info-icon">&#9432;</span>

            <input type="radio" id="business" class="inverstor-type-select-radio" name="investor" value="business" required>
            <label for="business">Business</label>
            <span class="business-info-icon">&#9432;</span>

            <input type="radio" id="ira" class="inverstor-type-select-radio" name="investor" value="ira" required>
            <label for="ira">IRA</label>
            <span class="ira-info-icon">&#9432;</span>

            <input type="radio" id="trust" class="inverstor-type-select-radio" name="investor" value="trust" required>
            <label for="trust">Trust</label>
            <span class="trust-info-icon">&#9432;</span>
          </div>
        </section>

        <br>

        <section class="agree-to-the-terms">
          <input type="checkbox" id="agree-to-the-terms-checkbox" required>
          <label for="agree-to-the-terms-checkbox" class="agree-to-the-terms-text">I agree to the terms and receiving notifications from intoo
            <span class="view-full-terms">
              View full terms</span>
            </label>
        </section>

        <section class="submit">
          <p class="create-account-button-p">
          <button type="submit" class="create-account-button">Create Account</button>
          </p>
        </section>
      </form>
    </main>
  </body>
</html>
